<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Inventario</title>
    <link rel="stylesheet" href="styles_index.css">
</head>
<body>
    <div class="login-container">
        <h2><center>Iniciar sesión</center></h2>
        <!-- Formulario de inicio de sesión -->
        <form action="validator.php" method="post">
            <div class="input-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required aria-label="Nombre de usuario">
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required minlength="12" maxlength="64" aria-label="Contraseña">
            </div>
            <center><button type="submit">Ingresar</button></center>
        </form>
    </div>
    
    <div id="error-container" style="display: none;" class="error-message">
        <p>ERROR DE AUTENTICACIÓN: Credenciales incorrectas</p>
    </div>

    <footer>
        <p>Copyright &copy; <span id="year"></span> Proyecto. Todos los derechos reservados.</p>
    </footer>

    <script src="scripts_index.js"></script>
    <script>
        // Mostrar el mensaje de error si hay un parámetro de error en la URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error') && urlParams.get('error') === 'auth') {
            document.getElementById('error-container').style.display = 'block';
        }
    </script>
    
</body>
</html>
